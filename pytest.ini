[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --tb=short
    --strict-markers
    -p no:warnings
markers =
    unit: Pure unit tests — no external I/O
    integration: Integration tests — FastAPI TestClient, mocked Supabase
    slow: Tests that take > 1 second (excluded from CI fast pass)
log_cli = true
log_cli_level = WARNING
