# Fly.io configuration for signalbolt-engine
#
# Process model:
#   app    — uvicorn (API only, no engine). Scales horizontally.
#   worker — runs APScheduler + Alpaca WebSocket. EXACTLY ONE machine.
#
# Keep worker count = 1 because the Alpaca SIP WebSocket should not run
# from multiple machines unless leader election / a distributed lock is
# implemented. Two workers would also duplicate every push notification.

app            = "signalbolt-engine"
primary_region = "iad"

# Give the old instance 30 s to close the Alpaca WebSocket cleanly before
# SIGKILL. Default is 5 s — too short for our graceful shutdown to send
# a proper FIN to Alpaca. Without this, SIGKILL drops the TCP connection
# hard; Alpaca holds the dead slot for up to 120 s via keepalive, causing
# the new instance to get TimeoutError instead of a clean 429.
kill_signal  = "SIGTERM"
kill_timeout = "30s"

[build]
  dockerfile = "Dockerfile"

[processes]
  # 1 uvicorn worker per VM — on shared-cpu-1x (1 vCPU), 2 workers fight
  # for the same core and starve the event loop. Scale capacity by raising
  # the machine count (fly scale count app=N) instead.
  app    = "uvicorn main:app --host 0.0.0.0 --port 8000 --workers 1"
  worker = "python -m engine.worker"

[env]
  PORT              = "8000"
  ALPACA_DATA_FEED  = "sip"
  # Web process is API-only by default. The worker process runs the engine.
  RUN_ENGINE_IN_WEB = "false"

[http_service]
  internal_port        = 8000
  force_https          = true
  auto_stop_machines   = false
  auto_start_machines  = true
  min_machines_running = 1
  processes            = ["app"]

  [http_service.concurrency]
    # Requests-based concurrency is the right model for FastAPI — connection-
    # based caps held idle keep-alive sockets and starved load balancing.
    type       = "requests"
    soft_limit = 25
    hard_limit = 50

  [[http_service.checks]]
    grace_period = "15s"
    interval     = "15s"
    method       = "GET"
    path         = "/health"
    protocol     = "http"
    timeout      = "2s"

[[vm]]
  # shared-cpu-2x has 2 vCPUs — needed to handle price WS + Stripe + Supabase
  # under market-open load without starving the event loop and timing out
  # health checks. The previous shared-cpu-1x caused /health to queue 60s+
  # behind slow /prices and /indices calls during peak traffic.
  size   = "shared-cpu-2x"
  memory = "1gb"
