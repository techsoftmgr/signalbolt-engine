# Fly.io configuration for signalbolt-engine
# Deployed as fallback when Railway is unavailable.

app            = "signalbolt-engine"
primary_region = "iad"

# Give the old instance 30 s to close the Alpaca WebSocket cleanly before
# SIGKILL.  Default is 5 s — too short for our graceful shutdown to send
# a proper FIN to Alpaca.  Without this, SIGKILL drops the TCP connection
# hard; Alpaca holds the dead slot for up to 120 s via keepalive, causing
# the new instance to get TimeoutError instead of a clean 429.
kill_signal  = "SIGTERM"
kill_timeout = "30s"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT             = "8000"

  ALPACA_DATA_FEED = "sip"

[http_service]
  internal_port        = 8000
  force_https          = true
  auto_stop_machines   = false
  auto_start_machines  = true
  min_machines_running = 1

  [http_service.concurrency]
    type       = "connections"
    hard_limit = 250
    soft_limit = 200

  [[http_service.checks]]
    grace_period = "60s"
    interval     = "15s"
    method       = "GET"
    path         = "/health"
    protocol     = "http"
    timeout      = "15s"

[[vm]]
  size   = "shared-cpu-1x"
  memory = "512mb"
