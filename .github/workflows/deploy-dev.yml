name: Deploy → DEV

# Auto-deploys to Railway dev environment after CI passes on the dev branch.
# Railway is configured to watch this branch — this workflow just waits and
# runs a smoke test after deploy.
#
# Required secret (add once Railway is set up):
#   DEV_ENGINE_URL  — full base URL, e.g. https://signalbolt-dev.railway.app

on:
  push:
    branches: [dev]

jobs:
  deploy-dev:
    name: Deploy to Railway (dev)
    runs-on: ubuntu-latest
    environment: development

    # Expose the secret as an env var so we can check it in `if:` conditions.
    # GitHub Actions cannot evaluate secrets directly in expressions.
    env:
      DEV_ENGINE_URL: ${{ secrets.DEV_ENGINE_URL }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check if Railway is configured
        id: railway_check
        run: |
          if [ -z "$DEV_ENGINE_URL" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "⚠️  DEV_ENGINE_URL secret not set — skipping smoke tests."
            echo "   Add it under Settings → Secrets → Actions once Railway dev is deployed."
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
            echo "DEV_ENGINE_URL is set — will run smoke tests after deploy."
          fi

      - name: Wait for Railway deploy to complete
        if: steps.railway_check.outputs.configured == 'true'
        # Railway typically takes 2-3 minutes to build and deploy
        run: sleep 120

      - name: Smoke test — /health endpoint
        if: steps.railway_check.outputs.configured == 'true'
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "$DEV_ENGINE_URL/health" \
            --max-time 15 \
            --retry 3 \
            --retry-delay 10)
          if [ "$STATUS" != "200" ]; then
            echo "Health check failed — got HTTP $STATUS"
            exit 1
          fi
          echo "Health check passed (HTTP $STATUS)"

      - name: Smoke test — /signals endpoint
        if: steps.railway_check.outputs.configured == 'true'
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "$DEV_ENGINE_URL/signals" \
            --max-time 15)
          echo "Signals endpoint: HTTP $STATUS"
          # 200 or 401 (key required) are both acceptable
          if [ "$STATUS" != "200" ] && [ "$STATUS" != "401" ]; then
            echo "Signals endpoint unexpected response: $STATUS"
            exit 1
          fi

      - name: Smoke tests passed
        if: steps.railway_check.outputs.configured == 'true' && success()
        run: echo "✅ Dev deploy smoke tests passed."
