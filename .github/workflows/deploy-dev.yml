name: Deploy → DEV

# Auto-deploys to Railway dev environment after CI passes on the dev branch.
# Railway is configured to watch this branch — this workflow just triggers it
# and runs a smoke test after deploy.

on:
  push:
    branches: [dev]

jobs:
  deploy-dev:
    name: Deploy to Railway (dev)
    runs-on: ubuntu-latest
    needs: []   # CI workflow runs in parallel — Railway triggers on push automatically
    environment: development

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Wait for Railway deploy to complete
        # Railway typically takes 2-3 minutes to deploy
        run: sleep 120

      - name: Smoke test — /health endpoint
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "${{ secrets.DEV_ENGINE_URL }}/health" \
            --max-time 15 \
            --retry 3 \
            --retry-delay 10)
          if [ "$STATUS" != "200" ]; then
            echo "Health check failed — got HTTP $STATUS"
            exit 1
          fi
          echo "Health check passed (HTTP $STATUS)"

      - name: Smoke test — /signals endpoint
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "${{ secrets.DEV_ENGINE_URL }}/signals" \
            --max-time 15)
          echo "Signals endpoint: HTTP $STATUS"
          # 200 or 401 (if auth required) are both acceptable
          if [ "$STATUS" != "200" ] && [ "$STATUS" != "401" ]; then
            echo "Signals endpoint unexpected response: $STATUS"
            exit 1
          fi

      - name: Notify success
        if: success()
        run: echo "Dev deploy smoke tests passed."

      - name: Notify failure
        if: failure()
        run: echo "Dev deploy smoke test FAILED — check Railway logs."
