name: CI — Test Suite

# Runs on every PR to dev or main, and on direct pushes to dev.
# Blocks merge if any test fails.

on:
  pull_request:
    branches: [dev, main]
  push:
    branches: [dev]

jobs:
  test:
    name: Run pytest
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      # Test-safe dummy values — no real keys in CI
      SUPABASE_URL:              "https://test.supabase.co"
      SUPABASE_SECRET_KEY:       "test_secret_key"
      ALPACA_API_KEY:            "test_alpaca_key"
      ALPACA_SECRET_KEY:         "test_alpaca_secret"
      ALPACA_BASE_URL:           "https://paper-api.alpaca.markets"
      ALPACA_DATA_FEED:          "iex"
      ANTHROPIC_API_KEY:         "test_anthropic_key"
      STRIPE_SECRET_KEY:         "sk_test_fake"
      STRIPE_PUBLISHABLE_KEY:    "pk_test_fake"
      STRIPE_WEBHOOK_SECRET:     "whsec_fake"
      STRIPE_PRO_PRICE_ID:       "price_fake_pro"
      STRIPE_PRO_PLUS_PRICE_ID:  "price_fake_proplus"
      SENTRY_DSN:                ""
      ENVIRONMENT:               "test"
      PORT:                      "8000"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install test dependencies
        run: pip install pytest pytest-asyncio httpx

      - name: Run unit tests
        run: pytest tests/unit/ -v --tb=short

      - name: Run integration tests
        run: pytest tests/integration/ -v --tb=short

      - name: Generate coverage report
        run: |
          pip install pytest-cov
          pytest tests/ --cov=engine --cov-report=term-missing --cov-fail-under=60
        continue-on-error: true   # Don't block on coverage yet — raise threshold over time
